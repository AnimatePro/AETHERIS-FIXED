<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHERIS - Roguelike Bullet Hell</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0e27;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            background: #000;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #0a0e27;
        }

        #loadingScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e27;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: #fff;
            font-size: 24px;
        }

        .loading-spinner {
            border: 4px solid #1a2a4a;
            border-top: 4px solid #ffd700;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #instructions {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            color: #aaa;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 11px;
            max-width: 220px;
            z-index: 100;
            border: 1px solid #ffd700;
        }

        .control-line {
            margin: 4px 0;
            line-height: 1.3;
        }

        .key {
            background: #ffd700;
            color: #000;
            padding: 2px 5px;
            border-radius: 2px;
            font-weight: bold;
            font-family: monospace;
            font-size: 9px;
            display: inline-block;
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="loadingScreen">
            <div class="loading-spinner"></div>
            <div>Loading AETHERIS...</div>
        </div>
        <div id="instructions">
            <div class="control-line"><span class="key">W/A/S/D</span> Move</div>
            <div class="control-line"><span class="key">SPACE</span> Shoot</div>
            <div class="control-line"><span class="key">SHIFT</span> Dash</div>
            <div class="control-line"><span class="key">ESC</span> Pause</div>
            <div class="control-line"><span class="key">R</span> Restart</div>
        </div>
    </div>

    <!-- Scripts in correct order -->
    <script src="utils.js"></script>
    <script src="data.js"></script>
    <script src="entities.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>

    <script>
        function setupCanvas() {
            const canvas = document.getElementById('gameCanvas');
            const container = document.getElementById('gameContainer');
            
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            
            console.log(`Canvas initialized: ${canvas.width}x${canvas.height}`);
            return canvas;
        }

        function initGame() {
            try {
                const canvas = setupCanvas();
                if (!canvas) {
                    console.error('Canvas not found!');
                    return;
                }

                if (!window.AETH) {
                    console.error('AETH not loaded!');
                    return;
                }

                if (!window.AETH.Game) {
                    console.error('Game class not loaded!');
                    return;
                }

                const game = new window.AETH.Game(canvas);
                game.run();
                window.game = game;
                console.log('Game started successfully!');
                
                setTimeout(() => {
                    const loading = document.getElementById('loadingScreen');
                    if (loading) loading.style.display = 'none';
                }, 300);
            } catch (err) {
                console.error('Game initialization error:', err);
            }
        }

        window.addEventListener('resize', () => {
            if (window.game && window.game.canvas) {
                const container = window.game.canvas.parentElement;
                window.game.canvas.width = container.offsetWidth;
                window.game.canvas.height = container.offsetHeight;
            }
        });

        document.addEventListener('contextmenu', (e) => e.preventDefault());

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initGame);
        } else {
            initGame();
        }
    </script>
</body>
</html>
