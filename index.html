<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHERIS - Roguelike Bullet Hell</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0e27;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1200px;
            max-height: 800px;
            background: #000;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #0a0e27;
            cursor: crosshair;
        }

        @media (max-width: 768px) {
            #gameContainer {
                max-width: 100%;
                max-height: 100%;
            }
            
            #gameCanvas {
                width: 100vw;
                height: 100vh;
            }
        }

        /* Loading screen */
        #loadingScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e27;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: #fff;
            font-size: 24px;
        }

        .loading-spinner {
            border: 4px solid #1a2a4a;
            border-top: 4px solid #ffd700;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Instructions */
        #instructions {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: #aaa;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 12px;
            max-width: 200px;
            z-index: 100;
            border: 1px solid #ffd700;
        }

        .control-line {
            margin: 3px 0;
        }

        .key {
            background: #ffd700;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            font-family: monospace;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="loadingScreen">
            <div class="loading-spinner"></div>
            <div>Loading AETHERIS...</div>
        </div>
        <div id="instructions">
            <div class="control-line"><span class="key">WASD</span> Move</div>
            <div class="control-line"><span class="key">SPACE</span> Shoot</div>
            <div class="control-line"><span class="key">SHIFT</span> Dash</div>
            <div class="control-line"><span class="key">ESC</span> Pause</div>
            <div class="control-line"><span class="key">R</span> Restart</div>
        </div>
    </div>

    <!-- Scripts in correct order -->
    <script src="utils.js"></script>
    <script src="data.js"></script>
    <script src="entities.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>

    <script>
        // Initialize canvas with responsive sizing
        function resizeCanvas() {
            const canvas = document.getElementById('gameCanvas');
            const container = document.getElementById('gameContainer');
            
            // Set canvas resolution
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Hide loading screen when game is ready
        window.addEventListener('load', () => {
            const loadingScreen = document.getElementById('loadingScreen');
            setTimeout(() => {
                loadingScreen.style.display = 'none';
            }, 500);
        });

        // Prevent context menu on canvas
        document.getElementById('gameCanvas').addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        // Handle fullscreen toggle
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F11') {
                e.preventDefault();
                const canvas = document.getElementById('gameCanvas');
                if (!document.fullscreenElement) {
                    canvas.requestFullscreen().catch(err => console.log(err));
                } else {
                    document.exitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
